apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backend-route
  namespace: {{ .Values.global.namespace }}
spec:
  parentRefs:
  - name: resumatch-gateway
  hostnames:
  - {{ .Values.global.domain | quote }}
  - "www.{{ .Values.global.domain }}"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api
    backendRefs:
    - name: backend-service
      port: {{ .Values.backend.service.port }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
  namespace: {{ .Values.global.namespace }}
spec:
  parentRefs:
  - name: resumatch-gateway
  hostnames:
  - {{ .Values.global.domain | quote }}
  - "www.{{ .Values.global.domain }}"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: frontend-service
      port: {{ .Values.frontend.service.port }}
