apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: resumatch-gateway
  namespace: {{ .Values.global.namespace }}
spec:
  gatewayClassName: nginx
  listeners:
  - name: http
    hostname: {{ .Values.global.domain | quote }}
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: Same
