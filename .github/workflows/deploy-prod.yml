name: Production CI/CD (Helm Deploy)

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push Backend Image
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/resume-ai-backend:latest
            ghcr.io/${{ github.repository_owner }}/resume-ai-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push Frontend Image
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_BACKEND_API_URL=${{ vars.NEXT_PUBLIC_BACKEND_API_URL || 'http://resumatches.com' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/resume-ai-frontend:latest
            ghcr.io/${{ github.repository_owner }}/resume-ai-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-helm:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Authenticate with Google Cloud
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Set up GKE context dynamically
      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.GKE_CLUSTER_NAME }}
          location: ${{ vars.GKE_CLUSTER_LOCATION }}


      # Install standard Gateway API Custom Resource Definitions (CRDs)
      - name: Ensure Gateway API CRDs Installed
        run: |
          kubectl kustomize https://github.com/nginx/nginx-gateway-fabric/config/crd/gateway-api/standard | kubectl apply -f -

      # Install or upgrade NGINX Gateway Fabric
      - name: Ensure NGINX Gateway Fabric Installed
        run: |
          helm upgrade --install ngf oci://ghcr.io/nginx/charts/nginx-gateway-fabric \
            --create-namespace \
            -n nginx-gateway

      # Deploy application using Helm Chart
      - name: Deploy with Helm
        run: |
          helm upgrade --install resumatch-release ./helm/resumatch \
            --create-namespace \
            -n resumatch-ai \
            --set backend.image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set frontend.image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set global.domain=${{ vars.DOMAIN || 'resumatches.com' }} \
            --set backend.config.SUPABASE_URL="${{ vars.NEXT_PUBLIC_SUPABASE_URL }}" \
            --set backend.secrets.DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --set backend.secrets.SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            --set backend.secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            --set backend.secrets.NVIDIA_API_KEY_REASONING="${{ secrets.NVIDIA_API_KEY_REASONING }}" \
            --set backend.secrets.NVIDIA_API_KEY_PARSING="${{ secrets.NVIDIA_API_KEY_PARSING }}" \
            --set backend.secrets.NVIDIA_API_KEY_EMBEDDING="${{ secrets.NVIDIA_API_KEY_EMBEDDING }}" \
            --set backend.secrets.NVIDIA_API_KEY_RERANKING="${{ secrets.NVIDIA_API_KEY_RERANKING }}" \
            --set backend.secrets.NVIDIA_API_KEY="${{ secrets.NVIDIA_API_KEY }}" \
            --set backend.secrets.GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --set backend.secrets.ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            --set backend.secrets.RAZORPAY_KEY_ID="${{ secrets.RAZORPAY_KEY_ID }}" \
            --set backend.secrets.RAZORPAY_KEY_SECRET="${{ secrets.RAZORPAY_KEY_SECRET }}" \
            --set backend.secrets.RAZORPAY_WEBHOOK_SECRET="${{ secrets.RAZORPAY_WEBHOOK_SECRET }}" \
            --set backend.secrets.CRON_SECRET="${{ secrets.CRON_SECRET }}"

      # Verify rollout status of Helm components
      - name: Verify Rollout Status
        run: |
          kubectl rollout status deployment/backend -n resumatch-ai --timeout=300s
          kubectl rollout status deployment/frontend -n resumatch-ai --timeout=300s
