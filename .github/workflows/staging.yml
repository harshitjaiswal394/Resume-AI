name: Staging Deployment to staging.resumatches.com

on:
  push:
    branches: [ "staging" ]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-east1
  REPOSITORY: resumatches-staging

permissions:
  contents: read
  id-token: write

jobs:
  build-and-prep:
    name: "1. Build & Prep (Staging)"
    runs-on: ubuntu-latest
    environment: dev # Using 'dev' environment secrets for now, or you can create a 'staging' env in GH
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Bootstrap Infra (Staging)
        run: |
          terraform apply -auto-approve \
            -target=google_project_service.services \
            -target=google_artifact_registry_repository.repo \
            -target=google_compute_network.vpc \
            -target=google_service_networking_connection.private_vpc_connection \
            -var="environment=staging" \
            -var="project_id=${{ env.PROJECT_ID }}" \
            -var="firebase_project_id=${{ secrets.FIREBASE_PROJECT_ID }}" \
            -var="domain_name=resumatches.com" \
            -var="database_url=stub" \
            -var="nvidia_api_key_reasoning=${{ secrets.NVIDIA_API_KEY_REASONING }}" \
            -var="nvidia_api_key_parsing=${{ secrets.NVIDIA_API_KEY_PARSING }}" \
            -var="nvidia_api_key_embedding=${{ secrets.NVIDIA_API_KEY_EMBEDDING }}" \
            -var="nvidia_api_key_reranking=${{ secrets.NVIDIA_API_KEY_RERANKING }}" \
            -var="image_tag=${{ github.sha }}"
        working-directory: ./terraform

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build & Push Backend
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/resumatches-staging/backend:${{ github.sha }} ./backend
          docker tag ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/resumatches-staging/backend:${{ github.sha }} ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/resumatches-staging/backend:latest
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/resumatches-staging/backend --all-tags

      - name: Build & Push Frontend
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY="${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID="${{ secrets.FIREBASE_PROJECT_ID }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET="${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}" \
            --build-arg NEXT_PUBLIC_BACKEND_API_URL="https://staging.resumatches.com" \
            --build-arg NEXT_PUBLIC_BACKEND_URL="https://staging.resumatches.com" \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/resumatches-staging/frontend:${{ github.sha }} ./frontend
          docker tag ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/resumatches-staging/frontend:${{ github.sha }} ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/resumatches-staging/frontend:latest
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/resumatches-staging/frontend --all-tags

  deploy:
    name: "2. Deploy (Staging)"
    needs: build-and-prep
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Final Terraform Apply (Staging)
        run: |
          terraform apply -auto-approve \
            -var="environment=staging" \
            -var="project_id=${{ env.PROJECT_ID }}" \
            -var="firebase_project_id=${{ secrets.FIREBASE_PROJECT_ID }}" \
            -var="domain_name=resumatches.com" \
            -var="database_url=stub" \
            -var="nvidia_api_key_reasoning=${{ secrets.NVIDIA_API_KEY_REASONING }}" \
            -var="nvidia_api_key_parsing=${{ secrets.NVIDIA_API_KEY_PARSING }}" \
            -var="nvidia_api_key_embedding=${{ secrets.NVIDIA_API_KEY_EMBEDDING }}" \
            -var="nvidia_api_key_reranking=${{ secrets.NVIDIA_API_KEY_RERANKING }}" \
            -var="image_tag=${{ github.sha }}"
        working-directory: ./terraform

  test:
    name: "3. Run E2E Tests (Staging)"
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
        working-directory: ./frontend
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        working-directory: ./frontend
      - name: Run Playwright tests
        env:
          PLAYWRIGHT_BASE_URL: https://staging.resumatches.com
        run: npx playwright test tests/e2e/responsiveness.spec.ts
        working-directory: ./frontend
