  terraform-destroy:
    name: "Terraform Destroy (Staging)"
    if: ${{ github.event.inputs.confirm_destroy == 'DESTROY-STAGING' }}
    runs-on: ubuntu-latest
    environment: dev
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Terraform Destroy (Staging)
        run: |
          terraform destroy -auto-approve \
            -var="environment=staging" \
            -var="gcp_project_id=${{ env.GCP_PROJECT_ID }}" \
            -var="firebase_project_id=${{ secrets.FIREBASE_PROJECT_ID }}" \
            -var="domain_name=resumatches.com" \
            -var="database_url=${{ secrets.GCP_DATABASE_URL }}" \
            -var="nvidia_api_key_reasoning=${{ secrets.NVIDIA_API_KEY_REASONING }}" \
            -var="nvidia_api_key_parsing=${{ secrets.NVIDIA_API_KEY_PARSING }}" \
            -var="nvidia_api_key_embedding=${{ secrets.NVIDIA_API_KEY_EMBEDDING }}" \
            -var="nvidia_api_key_reranking=${{ secrets.NVIDIA_API_KEY_RERANKING }}" \
            -var="firebase_api_key=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}" \
            -var="firebase_auth_domain=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}" \
            -var="firebase_storage_bucket=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}" \
            -var="firebase_messaging_sender_id=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}" \
            -var="firebase_app_id=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}" \
            -var="image_tag=${{ github.sha }}"
        working-directory: ./terraform
