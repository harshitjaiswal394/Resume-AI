name: GKE Production CI/CD (Secure Manifests Deploy)

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write  # Required for OIDC / Workload Identity Federation

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Secret Sanity Check — fail fast if required secrets are missing
      - name: Secret Sanity Check
        run: |
          ERROR=0
          required_secrets=(
            "DATABASE_URL"
            "SUPABASE_SERVICE_ROLE_KEY"
            "NEXT_PUBLIC_SUPABASE_ANON_KEY"
            "NVIDIA_API_KEY_REASONING"
            "NVIDIA_API_KEY_PARSING"
            "NVIDIA_API_KEY_EMBEDDING"
            "NVIDIA_API_KEY_RERANKING"
            "NVIDIA_API_KEY"
            "GEMINI_API_KEY"
            "NEXT_PUBLIC_GEMINI_API_KEY"
            "ANTHROPIC_API_KEY"
            "RAZORPAY_KEY_ID"
            "RAZORPAY_KEY_SECRET"
            "RAZORPAY_WEBHOOK_SECRET"
            "CRON_SECRET"
            "GCP_DATABASE_URL"
            "NEXT_PUBLIC_FIREBASE_API_KEY"
            "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN"
            "NEXT_PUBLIC_FIREBASE_PROJECT_ID"
            "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET"
            "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID"
            "NEXT_PUBLIC_FIREBASE_APP_ID"
          )
          declare -A secret_values=(
            ["DATABASE_URL"]="${{ secrets.DATABASE_URL }}"
            ["SUPABASE_SERVICE_ROLE_KEY"]="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
            ["NEXT_PUBLIC_SUPABASE_ANON_KEY"]="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}"
            ["NVIDIA_API_KEY_REASONING"]="${{ secrets.NVIDIA_API_KEY_REASONING }}"
            ["NVIDIA_API_KEY_PARSING"]="${{ secrets.NVIDIA_API_KEY_PARSING }}"
            ["NVIDIA_API_KEY_EMBEDDING"]="${{ secrets.NVIDIA_API_KEY_EMBEDDING }}"
            ["NVIDIA_API_KEY_RERANKING"]="${{ secrets.NVIDIA_API_KEY_RERANKING }}"
            ["NVIDIA_API_KEY"]="${{ secrets.NVIDIA_API_KEY }}"
            ["GEMINI_API_KEY"]="${{ secrets.GEMINI_API_KEY }}"
            ["NEXT_PUBLIC_GEMINI_API_KEY"]="${{ secrets.NEXT_PUBLIC_GEMINI_API_KEY }}"
            ["ANTHROPIC_API_KEY"]="${{ secrets.ANTHROPIC_API_KEY }}"
            ["RAZORPAY_KEY_ID"]="${{ secrets.RAZORPAY_KEY_ID }}"
            ["RAZORPAY_KEY_SECRET"]="${{ secrets.RAZORPAY_KEY_SECRET }}"
            ["RAZORPAY_WEBHOOK_SECRET"]="${{ secrets.RAZORPAY_WEBHOOK_SECRET }}"
            ["CRON_SECRET"]="${{ secrets.CRON_SECRET }}"
            ["GCP_DATABASE_URL"]="${{ secrets.GCP_DATABASE_URL }}"
            ["NEXT_PUBLIC_FIREBASE_API_KEY"]="${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}"
            ["NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN"]="${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}"
            ["NEXT_PUBLIC_FIREBASE_PROJECT_ID"]="${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}"
            ["NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET"]="${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}"
            ["NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID"]="${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}"
            ["NEXT_PUBLIC_FIREBASE_APP_ID"]="${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}"
          )
          for key in "${required_secrets[@]}"; do
            if [ -z "${secret_values[$key]}" ]; then
              echo "::error::Secret '$key' is MISSING in GitHub Actions secrets"
              ERROR=1
            fi
          done
          if [ "$ERROR" -eq 1 ]; then exit 1; fi
          echo "Secret sanity check PASSED."

      # 3. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Authenticate to Google Cloud via OIDC (Workload Identity Federation)
      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      # 5. Log in to Google Artifact Registry (GAR)
      - name: Log in to GAR
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.GAR_LOCATION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      # 6. Build and Push Backend Container Image
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ vars.GAR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPO }}/backend:latest
            ${{ vars.GAR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPO }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 7. Build and Push Frontend Container Image
      #    NEXT_PUBLIC_* values are baked at build time by Next.js
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_BACKEND_API_URL=${{ vars.NEXT_PUBLIC_BACKEND_API_URL }}
            NEXT_PUBLIC_GEMINI_API_KEY=${{ secrets.NEXT_PUBLIC_GEMINI_API_KEY }}
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          tags: |
            ${{ vars.GAR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPO }}/frontend:latest
            ${{ vars.GAR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPO }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 8. Get GKE Credentials dynamically
      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.GKE_CLUSTER_NAME }}
          location: ${{ vars.GKE_CLUSTER_LOCATION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      # 9. Update local deployment manifests with the specific image tags (for rolling updates)
      - name: Update Deployment Image Tags
        run: |
          sed -i "s|us-east1-docker.pkg.dev/project-fd5c6032-c8d6-497d-9c2/resumatches-official/backend:latest|${{ vars.GAR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPO }}/backend:${{ github.sha }}|g" kubernetes/backend.yaml
          sed -i "s|us-east1-docker.pkg.dev/project-fd5c6032-c8d6-497d-9c2/resumatches-official/frontend:latest|${{ vars.GAR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPO }}/frontend:${{ github.sha }}|g" kubernetes/frontend.yaml

      # 10. Deploy Namespace
      - name: Apply Namespace
        run: |
          kubectl apply -f kubernetes/namespace.yaml

      # 11. Create & Apply Secrets dynamically (idempotent, using dry-run)
      - name: Deploy Kubernetes Secrets
        run: |
          kubectl create secret generic resumatch-secrets -n resumatch-ai \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --from-literal=SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            --from-literal=NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            --from-literal=NVIDIA_API_KEY_REASONING="${{ secrets.NVIDIA_API_KEY_REASONING }}" \
            --from-literal=NVIDIA_API_KEY_PARSING="${{ secrets.NVIDIA_API_KEY_PARSING }}" \
            --from-literal=NVIDIA_API_KEY_EMBEDDING="${{ secrets.NVIDIA_API_KEY_EMBEDDING }}" \
            --from-literal=NVIDIA_API_KEY_RERANKING="${{ secrets.NVIDIA_API_KEY_RERANKING }}" \
            --from-literal=NVIDIA_API_KEY="${{ secrets.NVIDIA_API_KEY }}" \
            --from-literal=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --from-literal=NEXT_PUBLIC_GEMINI_API_KEY="${{ secrets.NEXT_PUBLIC_GEMINI_API_KEY }}" \
            --from-literal=ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            --from-literal=RAZORPAY_KEY_ID="${{ secrets.RAZORPAY_KEY_ID }}" \
            --from-literal=RAZORPAY_KEY_SECRET="${{ secrets.RAZORPAY_KEY_SECRET }}" \
            --from-literal=RAZORPAY_WEBHOOK_SECRET="${{ secrets.RAZORPAY_WEBHOOK_SECRET }}" \
            --from-literal=CRON_SECRET="${{ secrets.CRON_SECRET }}" \
            --from-literal=GCP_DATABASE_URL="${{ secrets.GCP_DATABASE_URL }}" \
            --from-literal=NEXT_PUBLIC_FIREBASE_API_KEY="${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}" \
            --from-literal=NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}" \
            --from-literal=NEXT_PUBLIC_FIREBASE_PROJECT_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}" \
            --from-literal=NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET="${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}" \
            --from-literal=NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}" \
            --from-literal=NEXT_PUBLIC_FIREBASE_APP_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      # 12. Apply ConfigMap and hardened application manifests
      - name: Deploy Application Resources
        run: |
          kubectl apply -f kubernetes/configmap.yaml
          kubectl apply -f kubernetes/backend.yaml
          kubectl apply -f kubernetes/frontend.yaml
          kubectl apply -f kubernetes/gateway-gke.yaml
          kubectl apply -f kubernetes/routes.yaml
          kubectl apply -f kubernetes/certificate.yaml
          kubectl apply -f kubernetes/issuer.yaml

      # 13. Verify rollout status
      - name: Verify Deployment Rollout
        run: |
          kubectl rollout status deployment/backend -n resumatch-ai --timeout=300s
          kubectl rollout status deployment/frontend -n resumatch-ai --timeout=300s
