# Copy this file to secrets.yaml, fill in your actual values, and apply:
# kubectl apply -f kubernetes/secrets.yaml
#
# WARNING: Do not commit the populated secrets.yaml to version control!
# Add secrets.yaml to your .gitignore.
apiVersion: v1
kind: Secret
metadata:
  name: resumatch-secrets
  namespace: resumatch-ai
type: Opaque
stringData:
  # Database connection string
  DATABASE_URL: "postgresql://postgres:[password]@db.[project].supabase.co:6543/postgres?sslmode=require"
  # GCP Production / Staging database URL
  GCP_DATABASE_URL: "postgresql://resumatch_app:[password]@[gcp-host]:5432/resumatch_staging"

  # Supabase Auth
  SUPABASE_SERVICE_ROLE_KEY: "your-supabase-service-role-key"
  NEXT_PUBLIC_SUPABASE_ANON_KEY: "your-supabase-anon-key"

  # AI API Keys (NVIDIA NIM)
  NVIDIA_API_KEY_REASONING: "your-nvidia-api-key-reasoning"
  NVIDIA_API_KEY_PARSING: "your-nvidia-api-key-parsing"
  NVIDIA_API_KEY_EMBEDDING: "your-nvidia-api-key-embedding"
  NVIDIA_API_KEY_RERANKING: "your-nvidia-api-key-reranking"
  NVIDIA_API_KEY: "your-nvidia-api-key-general"

  # Google Gemini
  GEMINI_API_KEY: "your-gemini-api-key"
  NEXT_PUBLIC_GEMINI_API_KEY: "your-gemini-api-key"

  # Anthropic Claude
  ANTHROPIC_API_KEY: "your-anthropic-api-key"

  # Razorpay Integrations
  RAZORPAY_KEY_ID: "your-razorpay-key-id"
  RAZORPAY_KEY_SECRET: "your-razorpay-key-secret"
  RAZORPAY_WEBHOOK_SECRET: "your-razorpay-webhook-secret"

  # App Cron
  CRON_SECRET: "your-cron-secret-token"

  # Firebase (used by frontend)
  NEXT_PUBLIC_FIREBASE_API_KEY: "your-firebase-api-key"
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "your-project.firebaseapp.com"
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: "your-firebase-project-id"
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "your-project.firebasestorage.app"
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "your-messaging-sender-id"
  NEXT_PUBLIC_FIREBASE_APP_ID: "your-firebase-app-id"
