apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backend-route
  namespace: resumatch-ai
spec:
  parentRefs:
  - name: resumatch-gateway
    sectionName: https
  hostnames:
  - jaiswal.shop
  - www.jaiswal.shop
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api
    backendRefs:
    - name: backend-service
      port: 8090
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
  namespace: resumatch-ai
spec:
  parentRefs:
  - name: resumatch-gateway
    sectionName: https
  hostnames:
  - jaiswal.shop
  - www.jaiswal.shop
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: frontend-service
      port: 3000
