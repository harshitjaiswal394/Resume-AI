apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: resumatch-ai
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
      - name: frontend
        image: us-east1-docker.pkg.dev/project-fd5c6032-c8d6-497d-9c2/resumatches-official/frontend:latest
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 3000
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "25m"
            memory: "192Mi"
        env:
        # ── ConfigMap values (non-sensitive) ──────────────────────────────────
        - name: NEXT_PUBLIC_SUPABASE_URL
          valueFrom:
            configMapKeyRef:
              name: resumatch-config
              key: NEXT_PUBLIC_SUPABASE_URL
        - name: NEXT_PUBLIC_BACKEND_API_URL
          valueFrom:
            configMapKeyRef:
              name: resumatch-config
              key: NEXT_PUBLIC_BACKEND_API_URL
        - name: BACKEND_API_URL
          valueFrom:
            configMapKeyRef:
              name: resumatch-config
              key: BACKEND_API_URL
        - name: NEXT_PUBLIC_APP_URL
          valueFrom:
            configMapKeyRef:
              name: resumatch-config
              key: NEXT_PUBLIC_APP_URL
        - name: GCP_PROJECT_ID
          valueFrom:
            configMapKeyRef:
              name: resumatch-config
              key: GCP_PROJECT_ID

        # ── Secret values (sensitive) ─────────────────────────────────────────
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: resumatch-secrets
              key: DATABASE_URL
        - name: NEXT_PUBLIC_SUPABASE_ANON_KEY
          valueFrom:
            secretKeyRef:
              name: resumatch-secrets
              key: NEXT_PUBLIC_SUPABASE_ANON_KEY
              optional: true
        # AI providers
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: resumatch-secrets
              key: GEMINI_API_KEY
              optional: true
        - name: NEXT_PUBLIC_GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: resumatch-secrets
              key: NEXT_PUBLIC_GEMINI_API_KEY
              optional: true
        - name: NVIDIA_API_KEY
          valueFrom:
            secretKeyRef:
              name: resumatch-secrets
              key: NVIDIA_API_KEY
              optional: true
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: resumatch-secrets
              key: ANTHROPIC_API_KEY
              optional: true
        # Razorpay
        - name: RAZORPAY_KEY_ID
          valueFrom:
            secretKeyRef:
              name: resumatch-secrets
              key: RAZORPAY_KEY_ID
              optional: true
        - name: RAZORPAY_KEY_SECRET
          valueFrom:
            secretKeyRef:
              name: resumatch-secrets
              key: RAZORPAY_KEY_SECRET
              optional: true
        - name: RAZORPAY_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: resumatch-secrets
              key: RAZORPAY_WEBHOOK_SECRET
              optional: true
        # Firebase (public config — stored as secrets to keep them out of image)
        - name: NEXT_PUBLIC_FIREBASE_API_KEY
          valueFrom:
            secretKeyRef:
              name: resumatch-secrets
              key: NEXT_PUBLIC_FIREBASE_API_KEY
              optional: true
        - name: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
          valueFrom:
            secretKeyRef:
              name: resumatch-secrets
              key: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
              optional: true
        - name: NEXT_PUBLIC_FIREBASE_PROJECT_ID
          valueFrom:
            secretKeyRef:
              name: resumatch-secrets
              key: NEXT_PUBLIC_FIREBASE_PROJECT_ID
              optional: true
        - name: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
          valueFrom:
            secretKeyRef:
              name: resumatch-secrets
              key: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
              optional: true
        - name: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
          valueFrom:
            secretKeyRef:
              name: resumatch-secrets
              key: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
              optional: true
        - name: NEXT_PUBLIC_FIREBASE_APP_ID
          valueFrom:
            secretKeyRef:
              name: resumatch-secrets
              key: NEXT_PUBLIC_FIREBASE_APP_ID
              optional: true

        livenessProbe:
          tcpSocket:
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          tcpSocket:
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: resumatch-ai
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
  selector:
    app: frontend
